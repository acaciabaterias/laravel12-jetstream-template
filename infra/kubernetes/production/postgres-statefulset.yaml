apiVersion: v1
kind: Service
metadata:
  name: postgres-central
  namespace: bateriaexpert
  labels:
    app.kubernetes.io/name: postgres-central
    app.kubernetes.io/part-of: bateriaexpert
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: postgres-central
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres-central
  namespace: bateriaexpert
  labels:
    app.kubernetes.io/name: postgres-central
    app.kubernetes.io/part-of: bateriaexpert
spec:
  serviceName: postgres-central
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: postgres-central
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgres-central
        app.kubernetes.io/part-of: bateriaexpert
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: postgres
          image: postgres:15
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_DB
              value: erp_central
            - name: POSTGRES_USER
              value: erp
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: erp-core-secrets
                  key: DB_CENTRAL_PASSWORD
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 45
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 5
          startupProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            periodSeconds: 10
            failureThreshold: 24
          resources:
            requests:
              cpu: 300m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
        labels:
          app.kubernetes.io/name: postgres-central
          app.kubernetes.io/part-of: bateriaexpert
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 100Gi
