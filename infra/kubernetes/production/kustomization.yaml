apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: bateriaexpert

resources:
  - ../namespace.yaml
  - configmap.yaml
  - cert-manager-issuer.yaml
  - postgres-statefulset.yaml
  - redis-deployment.yaml
  - backup-cronjob.yaml
  - deployment.yaml
  - deployment-ms-001.yaml
  - deployment-ms-002.yaml
  - deployment-ms-003.yaml
  - deployment-ms-004.yaml
  - deployment-ms-005.yaml
  - service.yaml
  - ingress.yaml
  - networkpolicy.yaml
  - hpa.yaml
  - poddisruptionbudget.yaml
  - servicemonitor.yaml

commonLabels:
  app.kubernetes.io/managed-by: kustomize
  app.kubernetes.io/part-of: bateriaexpert
  environment: production

images:
  - name: ghcr.io/example/bateriaexpert/erp-core
    newTag: latest
  - name: ghcr.io/example/bateriaexpert/ms-001-fiscal-acbr
    newTag: latest
  - name: ghcr.io/example/bateriaexpert/ms-002-bancario
    newTag: latest
  - name: ghcr.io/example/bateriaexpert/ms-003-whatsapp-n8n
    newTag: latest
  - name: ghcr.io/example/bateriaexpert/ms-004-openfinance
    newTag: latest
  - name: ghcr.io/example/bateriaexpert/ms-005-geocoding
    newTag: latest
