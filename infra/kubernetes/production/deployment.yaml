apiVersion: apps/v1
kind: Deployment
metadata:
  name: erp-core-web
  namespace: bateriaexpert
  labels:
    app.kubernetes.io/name: erp-core-web
    app.kubernetes.io/part-of: bateriaexpert
spec:
  replicas: 3
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app.kubernetes.io/name: erp-core-web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: erp-core-web
        app.kubernetes.io/part-of: bateriaexpert
    spec:
      containers:
        - name: erp-core-web
          image: ghcr.io/example/bateriaexpert/erp-core:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
              name: http
          envFrom:
            - configMapRef:
                name: erp-core-config
          env:
            - name: APP_KEY
              valueFrom:
                secretKeyRef:
                  name: erp-core-secrets
                  key: APP_KEY
            - name: DB_CENTRAL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: erp-core-secrets
                  key: DB_CENTRAL_PASSWORD
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: erp-core-secrets
                  key: REDIS_PASSWORD
                  optional: true
          readinessProbe:
            httpGet:
              path: /up
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /up
              port: http
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 5
          startupProbe:
            httpGet:
              path: /up
              port: http
            periodSeconds: 10
            failureThreshold: 24
          resources:
            requests:
              cpu: 500m
              memory: 768Mi
            limits:
              cpu: "2"
              memory: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: erp-core-queue
  namespace: bateriaexpert
  labels:
    app.kubernetes.io/name: erp-core-queue
    app.kubernetes.io/part-of: bateriaexpert
spec:
  replicas: 2
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app.kubernetes.io/name: erp-core-queue
  template:
    metadata:
      labels:
        app.kubernetes.io/name: erp-core-queue
        app.kubernetes.io/part-of: bateriaexpert
    spec:
      containers:
        - name: erp-core-queue
          image: ghcr.io/example/bateriaexpert/erp-core:latest
          imagePullPolicy: IfNotPresent
          command:
            - php
            - artisan
            - queue:work
            - --verbose
            - --tries=3
            - --timeout=120
          envFrom:
            - configMapRef:
                name: erp-core-config
          env:
            - name: APP_KEY
              valueFrom:
                secretKeyRef:
                  name: erp-core-secrets
                  key: APP_KEY
            - name: DB_CENTRAL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: erp-core-secrets
                  key: DB_CENTRAL_PASSWORD
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: erp-core-secrets
                  key: REDIS_PASSWORD
                  optional: true
          resources:
            requests:
              cpu: 300m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: erp-core-scheduler
  namespace: bateriaexpert
  labels:
    app.kubernetes.io/name: erp-core-scheduler
    app.kubernetes.io/part-of: bateriaexpert
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: erp-core-scheduler
  template:
    metadata:
      labels:
        app.kubernetes.io/name: erp-core-scheduler
        app.kubernetes.io/part-of: bateriaexpert
    spec:
      containers:
        - name: erp-core-scheduler
          image: ghcr.io/example/bateriaexpert/erp-core:latest
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - while true; do php artisan schedule:run --verbose --no-interaction; sleep 60; done
          envFrom:
            - configMapRef:
                name: erp-core-config
          env:
            - name: APP_KEY
              valueFrom:
                secretKeyRef:
                  name: erp-core-secrets
                  key: APP_KEY
            - name: DB_CENTRAL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: erp-core-secrets
                  key: DB_CENTRAL_PASSWORD
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: erp-core-secrets
                  key: REDIS_PASSWORD
                  optional: true
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
