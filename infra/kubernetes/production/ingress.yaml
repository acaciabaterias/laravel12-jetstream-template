apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: erp-core-ingress
  namespace: bateriaexpert
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-body-size: 20m
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
spec:
  tls:
    - hosts:
        - erp.example.com
      secretName: erp-core-tls
  rules:
    - host: erp.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: erp-core-web
                port:
                  number: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: microservices-ingress
  namespace: bateriaexpert
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts:
        - ms-001.example.com
        - ms-002.example.com
        - ms-003.example.com
        - ms-004.example.com
        - ms-005.example.com
      secretName: microservices-tls
  rules:
    - host: ms-001.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ms-001-fiscal-api
                port:
                  number: 8001
    - host: ms-002.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ms-002-banking-api
                port:
                  number: 8002
    - host: ms-003.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ms-003-notification-api
                port:
                  number: 8003
    - host: ms-004.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ms-004-openfinance-api
                port:
                  number: 8004
    - host: ms-005.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ms-005-geocoding-api
                port:
                  number: 8005
