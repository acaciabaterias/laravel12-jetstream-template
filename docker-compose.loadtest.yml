services:
  nginx:
    image: nginx:alpine
    ports:
      - "8082:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.loadtest.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php-fpm
    networks:
      - loadtest

  php-fpm:
    image: bateriaexpert/erp:latest
    command: ["php-fpm", "-F"]
    env_file:
      - ./.env.example
      - ./.env
    environment:
      APP_ENV: local
      APP_URL: http://127.0.0.1:8082
      DB_CONNECTION: central
      DB_CENTRAL_DRIVER: pgsql
      DB_CENTRAL_HOST: 192.168.1.103
      DB_CENTRAL_PORT: 5432
      DB_CENTRAL_DATABASE: ci_central
      DB_CENTRAL_USERNAME: postgres
      DB_CENTRAL_PASSWORD: JE9VM6NuiwHGFIl
      DB_TENANT_DRIVER: pgsql
      DB_TENANT_HOST: 192.168.1.103
      DB_TENANT_PORT: 5432
      DB_TENANT_DATABASE: ci_tenant
      DB_TENANT_USERNAME: postgres
      DB_TENANT_PASSWORD: JE9VM6NuiwHGFIl
      CACHE_STORE: array
      SESSION_DRIVER: file
      SESSION_SECURE_COOKIE: false
      QUEUE_CONNECTION: sync
      REDIS_HOST: 127.0.0.1
      REDIS_PORT: 6379
    volumes:
      - ./:/var/www/html
      - ./docker/php/www.loadtest.conf:/usr/local/etc/php-fpm.d/www.conf:ro
    networks:
      - loadtest

networks:
  loadtest:
    driver: bridge
